services:
  rasptele:
    image: ghcr.io/maddhruv/rasptele:0.2.0
    pull_policy: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?required}
      TELEGRAM_ALLOWED_USER_ID: ${TELEGRAM_ALLOWED_USER_ID:?required}
      PIHOLE_URL: ${PIHOLE_URL:-}
      PIHOLE_PASSWORD: ${PIHOLE_PASSWORD:-}
      RASPTELE_RESTART_ALLOWED: ${RASPTELE_RESTART_ALLOWED:-}
      RASPTELE_MONITOR_INTERVAL_SECONDS: ${RASPTELE_MONITOR_INTERVAL_SECONDS:-60}
      RASPTELE_REMINDER_INTERVAL_MINUTES: ${RASPTELE_REMINDER_INTERVAL_MINUTES:-30}
      RASPTELE_AUDIT_RETENTION_DAYS: ${RASPTELE_AUDIT_RETENTION_DAYS:-90}
      RASPTELE_DISK_PERCENT: ${RASPTELE_DISK_PERCENT:-90}
      RASPTELE_TEMPERATURE_CELSIUS: ${RASPTELE_TEMPERATURE_CELSIUS:-80}
    depends_on:
      docker-guard:
        condition: service_started
    pid: host
    volumes:
      - rasptele-data:/data
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    restart: unless-stopped

  docker-guard:
    image: ghcr.io/maddhruv/rasptele:0.2.0
    pull_policy: always
    environment:
      RASPTELE_RESTART_ALLOWED: ${RASPTELE_RESTART_ALLOWED:-}
    command: ["--guard"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  rasptele-watchdog:
    image: ghcr.io/maddhruv/rasptele:0.2.0
    pull_policy: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?required}
      TELEGRAM_ALLOWED_USER_ID: ${TELEGRAM_ALLOWED_USER_ID:?required}
      RASPTELE_MONITOR_INTERVAL_SECONDS: ${RASPTELE_MONITOR_INTERVAL_SECONDS:-60}
    command: ["--watchdog"]
    depends_on:
      docker-guard:
        condition: service_started
    restart: unless-stopped

volumes:
  rasptele-data:
