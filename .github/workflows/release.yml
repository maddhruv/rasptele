name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches the configured version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: test "$RELEASE_TAG" = "v$(node -p "require('./package.json').version")"
      - run: pip install . ruff mypy
      - run: ruff check src tests
      - run: mypy --ignore-missing-imports src
      - run: python -m unittest discover -s tests -v
      - name: Validate rendered Compose secret boundaries
        env:
          TELEGRAM_BOT_TOKEN: ci-token
          TELEGRAM_ALLOWED_USER_ID: "1"
          PIHOLE_PASSWORD: ci-pihole-password
        run: |
          for file in compose.yaml compose.coolify.yaml compose.portainer.yaml; do
            rendered="$(docker compose -f "$file" config --format json)"
            jq -e '
              .services.rasptele.environment
                | has("TELEGRAM_BOT_TOKEN")
                  and has("TELEGRAM_ALLOWED_USER_ID")
                  and has("PIHOLE_PASSWORD")
            ' <<<"$rendered"
            jq -e '
              .services["docker-guard"].environment // {}
                | (has("TELEGRAM_BOT_TOKEN") or has("TELEGRAM_ALLOWED_USER_ID") or has("PIHOLE_PASSWORD"))
                  | not
            ' <<<"$rendered"
            jq -e '
              .services["rasptele-watchdog"].environment
                | has("TELEGRAM_BOT_TOKEN")
                  and has("TELEGRAM_ALLOWED_USER_ID")
                  and (has("PIHOLE_PASSWORD") | not)
            ' <<<"$rendered"
          done

  image:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: rasptele:release-check
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: rasptele:release-check
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  publish:
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ghcr.io/maddhruv/rasptele
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.ref_name }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  publish-github-release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Publish the prepared draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false --verify-tag
