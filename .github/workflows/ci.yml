name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: pip install . ruff mypy
      - run: ruff check src tests
      - run: mypy --ignore-missing-imports src
      - run: python -m unittest discover -s tests -v
      - name: Validate rendered Compose secret boundaries
        env:
          TELEGRAM_BOT_TOKEN: ci-token
          TELEGRAM_ALLOWED_USER_ID: "1"
          PIHOLE_PASSWORD: ci-pihole-password
        run: |
          for file in compose.yaml compose.coolify.yaml compose.portainer.yaml; do
            rendered="$(docker compose -f "$file" config --format json)"
            jq -e '
              .services.rasptele.environment
                | has("TELEGRAM_BOT_TOKEN")
                  and has("TELEGRAM_ALLOWED_USER_ID")
                  and has("PIHOLE_PASSWORD")
            ' <<<"$rendered"
            jq -e '
              .services["docker-guard"].environment // {}
                | (has("TELEGRAM_BOT_TOKEN") or has("TELEGRAM_ALLOWED_USER_ID") or has("PIHOLE_PASSWORD"))
                  | not
            ' <<<"$rendered"
            jq -e '
              .services["rasptele-watchdog"].environment
                | has("TELEGRAM_BOT_TOKEN")
                  and has("TELEGRAM_ALLOWED_USER_ID")
                  and (has("PIHOLE_PASSWORD") | not)
            ' <<<"$rendered"
          done

  image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: rasptele:ci
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: rasptele:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
