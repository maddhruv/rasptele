name: Bug report
description: Report reproducible behavior that differs from the documentation.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues before filing a report. Do not include tokens, passwords, session IDs, or other secrets.
  - type: input
    id: version
    attributes:
      label: Rasptele version
      description: Provide a release tag or commit hash.
      placeholder: v0.1.1
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose from a local checkout
        - Coolify
        - Portainer
        - Other
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Raspberry Pi and operating system
      placeholder: Raspberry Pi 5, Raspberry Pi OS 64-bit
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest repeatable sequence.
      placeholder: |
        1. Configure ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or configuration
      description: Remove all tokens, user IDs, passwords, sessions, public addresses, and unrelated host data.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reproduced this on the latest release or current `main`.
          required: true
        - label: I removed secrets and personal data from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
